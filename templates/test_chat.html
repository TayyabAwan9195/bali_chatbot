<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Testing - Bali Legal Partner</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/base.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/chat.css') }}" rel="stylesheet">
</head>
<body>
    <div class="chat-wrapper">
        <!-- Chat Header -->
        <div class="chat-header">
            <div class="logo">
                <i class="fas fa-balance-scale"></i>
            </div>
            <h1>Bali Legal Partner</h1>
        </div>

        <!-- Phone Input Section (for testing) -->
        <div class="phone-input-section">
            <label for="phoneInput">Test Phone Number:</label>
            <input type="text" id="phoneInput" placeholder="Enter test phone number (e.g., +1234567890)" value="{{ phone or '' }}">
            <button type="button" id="setPhoneBtn" class="btn btn-primary">Set Phone</button>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
            {% for msg in chat_history %}
            <div class="message {{ 'user' if msg.type == 'user' else 'bot' }}">
                <div class="message-bubble">{{ msg.text }}</div>
                <div class="message-time">{{ '' }}</div>
            </div>
            {% endfor %}
        </div>

        <!-- Chat Input -->
        <div class="chat-input-container">
            <form id="messageForm">
                <input type="text" id="messageInput" class="chat-input" placeholder="Type your message..." required>
                <button type="submit" id="sendBtn" class="send-button">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
